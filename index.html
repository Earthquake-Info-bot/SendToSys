<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SendToSys</title>
  <style>
    body { font-family: "Yu Gothic","メイリオ",sans-serif; padding: 20px; }
    h2 { margin: 5px 0 10px 0;}
    label {display: block; margin: 8px 0; cursor: pointer;}
    button { margin-top: 15px; padding: 6px 12px; font-size: 14px; }
    input[type="checkbox"] { transform: scale(1.5); margin-right: 8px; vertical-align: middle;}
    #overlay {position: fixed; top: 0; left: 0; width: 100%; height: 100%;
              background-color: rgba(0,0,0,0.5); display: flex; align-items: center;
              justify-content: center; z-index: 9999; font-size: 24px; color: white;
              font-family: "Yu Gothic","Meiryo",sans-serif; display: none;}
  </style>
</head>
<body>
<h2>SendToSystem - 送信先設定(vT9.3)</h2>
<p id="last_update">最終更新日時: ----/--/-- --:--:--</p>
<label>
  <input type="checkbox" id="iPad"> iPad
</label>
<label>
  <input type="checkbox" id="Android"> Android
</label>
<label>
  メモ:
  <textarea id="memo" rows="5" style="width:100%; overflow:hidden; font-size:15px"></textarea>
</label>
<button>保存</button>
<p id="json">{}</p>
<p id="p_pw" style="color:blue; font-weight:bold; font-size:14px">Please enter the password:</p>
<textarea id="password" rows="1" style="width:100%; overflow:hidden; font-size:14px"></textarea>
<div id="overlay">読込中…</div>

<script type="module">
  init();
  
  async function init() {
    const data = await loadData();
  
    // UIテスト用：初期状態を仮で設定
    document.getElementById("iPad").checked = data.send_to.iPad;
    document.getElementById("Android").checked = data.send_to.Android;
    document.getElementById("last_update").textContent = "最終更新日時: "+data.last_update;
    if (data.memo === "") {
      document.getElementById("memo").value = "";
      document.getElementById("memo").placeholder = "ここにメモを入力";
    } else {
      document.getElementById("memo").value = data.memo;
    }
    document.getElementById("json").textContent = JSON.stringify(data,null,1);
  
    // 初期値を設定
    document.getElementById("memo").value = data.memo || "";
    adjustHeight(document.getElementById("memo"));
  
    // テキスト変更時も自動調整
    document.getElementById("memo").addEventListener(
      "input", () => adjustHeight(document.getElementById("memo"))
    );
  
    // ほかの場所をタップしたら入力終了
    document.addEventListener("click", (e) => {
      const excludedTags = ["BUTTON", "INPUT", "LABEL"];
      if (!document.getElementById("memo").contains(e.target)
          && !excludedTags.includes(e.target.tagName)) {
            document.getElementById("memo").blur();
      }
    });
    document.querySelector("button").addEventListener("click", save);
  }
  
  async function loadData() {
    const res = await fetch('https://earthquake-info-bot.github.io/SendToSys/data.json');  // data.json を読み込む
    if (!res.ok) throw new Error('data.json が読めません'); 
    const data = await res.json();           // JSON をオブジェクト化
    return data;                             // 呼び出し元に返す
  }
  
  // 高さ調整関数
  function adjustHeight(el) {
    el.style.height = "1px";       // いったんリセット
    const minRows = 5;
    const lineHeight = 20; // px, CSSで調整
    el.style.height = Math.max(el.scrollHeight, minRows * lineHeight) + "px";
  }

  // 保存ボタン押したとき
  async function save() {
    const password = document.getElementById("password").value;
    const result = confirm("以下のパスワードで保存します。\n"+password);
    if(!result){
      return;
    }
    showOverlay();
    const iPad = document.getElementById("iPad").checked;
    const Android = document.getElementById("Android").checked;
    let message = "【保存完了】\n"
    if (iPad&&Android) message += "iPad/Androidの両方に送信します。";
    else if (iPad&&!Android) message += "iPadのみに送信します。";
    else if (!iPad&&Android) message += "Androidのみに送信します。";
    else if (!iPad&&!Android) message += "全情報の送信を停止します。";
    else message = "不明なエラーです。やり直しください。";

    let new_json = {
      "send_to":{
        "iPad":iPad,"Android":Android},
      "last_update":getNowFormatted(new Date()),
      "memo":document.getElementById("memo").value};
    document.getElementById("json").textContent = JSON.stringify(new_json,null,1);

    const accessTokenUrl = `https://script.google.com/macros/s/AKfycbziY2BN073ZtG2M0GiYWVCU7DAD9Lv4fSqGkeVrjMGKntgIeKwxlct_${password}J10y/exec`;
    const accessToken = await loadAccessToken(accessTokenUrl);
    if (accessToken === "/ERROR/") {
      hideOverlay();
      alert("The password is incorrect, or the page does not exist.\nPlease try again.")
      return;
    } else {
      hideOverlay();
      await pushToGitHub(new_json, accessToken)
      alert(message + "\n\nページを再読込します。");
      location.reload();
    }
  }
  async function loadAccessToken(url) {
    try {
      const res = await fetch(url);  // data.json を読み込む
      if (res.ok) {
        const data = await res.json();           // JSON をオブジェクト化
        const accessTokenEncoded = data.accessToken;
        //const accessTokenDecoded = Utilities.newBlob(accessTokenEncoded).getDataAsString();
        const accessTokenDecoded = atob(accessTokenEncoded);
        return accessTokenDecoded;
      } else {
        return "/ERROR/"
      }
    } catch(e) {
      return "/ERROR/";
    }
  }
  function getNowFormatted(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0'); // 月は0始まり
    const day = String(d.getDate()).padStart(2, '0');
    const h = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    const s = String(d.getSeconds()).padStart(2, '0');
    return `${y}/${m}/${day} ${h}:${min}:${s}`;
  }
  // オーバーレイ表示
  function showOverlay() {
    document.getElementById("overlay").style.display = "flex";
  }
  // オーバーレイ非表示
  function hideOverlay() {
    document.getElementById("overlay").style.display = "none";
  }
  async function pushToGitHub(newJson, accessToken) {
    try {
      const owner = 'earthquake-info-bot'; // リポジトリ所有者
      const repo = 'SendToSys';             // リポ名
      const path = 'data.json';             // 更新対象
      const branch = 'main';                // ブランチ
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
    
      // まず最新の SHA を取得
      const getRes = await fetch(apiUrl + `?ref=${branch}`, {
        headers: { 'Authorization': `token ${accessToken}` }
      });
      if (!getRes.ok) throw new Error("GitHub API から SHA が取れません");
      const fileData = await getRes.json();
      const sha = fileData.sha;
    
      // PUT で更新
      const putRes = await fetch(apiUrl, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${accessToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: "Update via web",
          content: utf8_to_b64(JSON.stringify(newJson, null, 1)), // 日本語対応
          branch: branch,
          sha: sha
        })
      });
      alert("accessToken:"+accessToken);
      alert("sha:"+sha);
      if (!putRes.ok) {
        const errData = await putRes.json().catch(()=>({message:"JSON取得失敗"}));
        throw new Error("GitHub に push できませんでした\n" + (errData.message || JSON.stringify(errData)));
      }
      const result = await putRes.json();
      alert(result);
      alert("更新完了\n" + result.content.html_url);
    } catch(e) {
      alert("ERROR\n"+e)
    }
  }
  function utf8_to_b64(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }
</script>
</body>
</html>
